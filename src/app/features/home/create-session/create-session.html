<main class="relative mx-auto flex min-h-dvh max-w-[560px] flex-col overflow-hidden px-5 pb-12 pt-[clamp(1.5rem,6vw,3rem)]">
  <div class="bg-net" aria-hidden="true"></div>

  <header class="stagger flex items-center gap-[0.55rem]" style="--d: 0">
    <span class="ball" style="--s: 1.4rem"></span>
    <span class="font-display text-[0.85rem] font-extrabold tracking-[0.12em] text-court-deep">
      THE&nbsp;DINK&nbsp;CLUB
    </span>
  </header>

  <h1 class="stagger mt-[clamp(2rem,12vh,5rem)] font-display text-[clamp(3.2rem,17vw,5.5rem)] font-extrabold text-ink" style="--d: 1">
    Open play,<br />
    <span class="accent text-court">sorted.</span>
  </h1>
  <p class="stagger mb-8 mt-4 max-w-[30ch] text-[1.05rem] leading-relaxed text-ink-soft" style="--d: 2">
    Spin up a session, share the code, and let the queue run itself —
    4-on / 4-off, challenger court and all.
  </p>

  <section class="stagger flex flex-col rounded-card border-[2.5px] border-ink bg-paper p-[1.4rem] shadow-hard" style="--d: 3">
    <label class="mb-[0.35rem] font-display text-[0.8rem] font-bold uppercase tracking-[0.08em] text-ink-soft" for="sname">
      Session name
    </label>
    <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
      <input
        id="sname"
        matInput
        name="sname"
        [(ngModel)]="name"
        placeholder="Tuesday Night Open Play"
        maxlength="60"
      />
    </mat-form-field>

    <label class="mb-[0.35rem] mt-[1.1rem] font-display text-[0.8rem] font-bold uppercase tracking-[0.08em] text-ink-soft" for="yname">
      Your name
    </label>
    <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
      <input
        id="yname"
        matInput
        name="yname"
        [(ngModel)]="yourName"
        placeholder="You'll join the queue too"
        maxlength="40"
      />
      <mat-hint>Leave blank to just run the courts.</mat-hint>
    </mat-form-field>

    <label class="mb-[0.35rem] mt-[1.4rem] font-display text-[0.8rem] font-bold uppercase tracking-[0.08em] text-ink-soft">
      Courts
    </label>
    <div class="flex items-center gap-[0.9rem]">
      <button
        type="button"
        (click)="bump(-1)"
        aria-label="Fewer courts"
        class="h-12 w-12 flex-none rounded-xl border-[2.5px] border-ink bg-paper-2 text-2xl font-bold leading-none shadow-hard-sm transition-transform active:translate-x-[3px] active:translate-y-[3px] active:shadow-none"
      >
        −
      </button>
      <span class="min-w-[2ch] text-center font-display text-[2.4rem] font-extrabold tabular-nums">
        {{ courtCount() }}
      </span>
      <button
        type="button"
        (click)="bump(1)"
        aria-label="More courts"
        class="h-12 w-12 flex-none rounded-xl border-[2.5px] border-ink bg-paper-2 text-2xl font-bold leading-none shadow-hard-sm transition-transform active:translate-x-[3px] active:translate-y-[3px] active:shadow-none"
      >
        +
      </button>
      <span class="text-[0.85rem] italic text-ink-soft">add or remove later</span>
    </div>

    @if (error()) {
      <p class="mb-0 mt-[0.8rem] font-semibold text-clay-deep">{{ error() }}</p>
    }

    <button
      (click)="create()"
      [disabled]="creating()"
      class="mt-[1.6rem] inline-flex cursor-pointer items-center justify-center gap-[0.6rem] rounded-[14px] border-[2.5px] border-ink bg-court px-6 py-4 font-display text-[1.15rem] font-extrabold text-paper shadow-hard transition-[transform,background] hover:bg-court-deep active:translate-x-1 active:translate-y-1 active:shadow-none disabled:cursor-progress disabled:opacity-70"
    >
      <span class="ball" style="--s: 1.3rem"></span>
      {{ creating() ? 'Setting up the courts…' : 'Start session' }}
    </button>
  </section>

  <!-- Join an existing session -->
  <section class="stagger mt-5 flex items-center gap-3 rounded-card border-2 border-dashed border-ink/40 bg-paper-2/60 p-[0.9rem]" style="--d: 4">
    <div class="flex-1">
      <p class="m-0 font-display text-[0.8rem] font-bold uppercase tracking-[0.08em] text-ink-soft">
        Got a code?
      </p>
      <input
        name="joincode"
        [ngModel]="joinCode()"
        (ngModelChange)="joinCode.set($event.toUpperCase())"
        (keyup.enter)="goJoin()"
        placeholder="e.g. RDYDN"
        maxlength="40"
        class="mt-1 w-full border-0 bg-transparent font-display text-[1.6rem] font-extrabold uppercase tracking-[0.1em] text-ink outline-none placeholder:text-ink-soft/50"
      />
    </div>
    <button
      (click)="goJoin()"
      [disabled]="!joinCode().trim()"
      aria-label="Join session"
      class="h-12 w-12 flex-none cursor-pointer rounded-xl border-[2.5px] border-ink bg-lime text-xl font-bold shadow-hard-sm transition-transform active:translate-x-[3px] active:translate-y-[3px] active:shadow-none disabled:opacity-40"
    >
      →
    </button>
  </section>
</main>
