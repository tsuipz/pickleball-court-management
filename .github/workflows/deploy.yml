name: Deploy

# Runs only after the CI workflow finishes on main — so we never deploy a
# commit that failed build/test, even without branch protection.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # Inject the real (public) Firebase web config from repo variables.
      - name: Generate Firebase environment
        run: |
          cat > src/environments/environment.ts <<'EOF'
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ vars.FIREBASE_API_KEY }}',
              authDomain: '${{ vars.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ vars.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ vars.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ vars.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ vars.FIREBASE_APP_ID }}',
              measurementId: '${{ vars.FIREBASE_MEASUREMENT_ID }}',
            },
          };
          EOF

      - name: Build (production)
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PICKLEBALL_COURT_MANAGEMENT }}
          projectId: pickleball-court-management
          channelId: live
