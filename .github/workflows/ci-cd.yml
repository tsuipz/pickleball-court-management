name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

# Allow one concurrent deployment per ref; cancel superseded runs.
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24' # Angular 22 needs Node >= 24.15
          cache: npm

      - run: npm ci

      # environment.ts is git-ignored; a placeholder is enough to compile/test
      # (the unit tests don't touch Firebase).
      - name: Provide placeholder Firebase config
        run: cp src/environments/environment.example.ts src/environments/environment.ts

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx ng test --watch=false

  deploy:
    name: Deploy to Firebase Hosting
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # Inject the real (public) Firebase web config from repo variables.
      - name: Generate Firebase environment
        run: |
          cat > src/environments/environment.ts <<'EOF'
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ vars.FIREBASE_API_KEY }}',
              authDomain: '${{ vars.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ vars.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ vars.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ vars.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ vars.FIREBASE_APP_ID }}',
              measurementId: '${{ vars.FIREBASE_MEASUREMENT_ID }}',
            },
          };
          EOF

      - name: Build (production)
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PICKLEBALL_COURT_MANAGEMENT }}
          projectId: pickleball-court-management
          channelId: live
